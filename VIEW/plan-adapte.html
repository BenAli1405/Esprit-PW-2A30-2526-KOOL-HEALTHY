<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Adapte - Kool Healthy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #4caf50;
            --green-dark: #2f8a43;
            --blue: #29b6f6;
            --blue-dark: #1d94cb;
            --text: #2c3e2f;
            --muted: #5f6f64;
            --panel: #ffffff;
            --bg: #f3f5f6;
            --line: #dce4df;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--green);
            font-weight: 800;
            font-size: 2rem;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(145deg, #66cf74, #3daa4a);
        }

        .user-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border-radius: 999px;
            padding: 8px 16px;
            background: #eaf2ec;
            color: #336b46;
            font-weight: 700;
        }

        .user-dot {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--green);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
        }

        .hero {
            margin: 0;
            padding: 40px 5% 44px;
            background: linear-gradient(90deg, #d9efe4, #d5eaf2);
            border-top: 3px solid #eef5f2;
            border-bottom: 1px solid #d3e0da;
            text-align: center;
        }

        .hero h1 {
            margin: 0;
            color: var(--green-dark);
            font-size: clamp(1.9rem, 4vw, 3rem);
            letter-spacing: 0.01em;
        }

        .hero p {
            margin: 10px 0 0;
            color: #516158;
            font-size: 1.05rem;
        }

        .container {
            width: min(1360px, 94%);
            margin: 18px auto 30px;
        }

        .back-wrap {
            margin: 2px 0 14px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            border: 1.8px solid #2da6ea;
            border-radius: 999px;
            padding: 9px 18px;
            background: #eef8ff;
            color: #1586c9;
            font-weight: 800;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            filter: brightness(0.98);
        }

        .section-title {
            margin: 10px 0 10px;
            font-size: 1.15rem;
            color: var(--green-dark);
        }

        .planner-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.04);
        }

        .planner-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 860px;
            background: var(--panel);
        }

        .planner-table th,
        .planner-table td {
            border-bottom: 1px solid var(--line);
            padding: 11px 12px;
            text-align: left;
            vertical-align: top;
            font-size: 0.92rem;
        }

        .planner-table th {
            background: #edf6f1;
            color: #24523b;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .summary-line {
            margin: 10px 0 0;
            color: #4d5e55;
            font-size: 0.9rem;
        }

        .signal-btn {
            border: 1px solid #e49b9b;
            background: #fff2f2;
            color: #b24444;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
        }

        .signal-btn:hover {
            filter: brightness(0.97);
        }

        @media (max-width: 1100px) {
            .planner-table {
                min-width: 720px;
            }
        }

        @media (max-width: 760px) {
            .brand {
                font-size: 1.6rem;
            }

            .user-pill {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="home.php" aria-label="Kool Healthy">
            <span class="brand-mark" aria-hidden="true"></span>
            <span>Kool Healthy</span>
        </a>

        <div class="user-pill">
            <span class="user-dot">KH</span>
            <span id="userTarget">Plan adapte</span>
        </div>
    </header>

    <section class="hero">
        <h1>Decouvrez votre plan adapte</h1>
        <p id="heroSubtitle">Consultez et ajustez vos recettes selon vos besoins nutritionnels.</p>
    </section>

    <main class="container">
        <div class="back-wrap">
            <a class="back-btn" href="plan-nutritionnel.html" aria-label="Retour a la premiere page">Retour a la premiere page</a>
        </div>

        <h2 class="section-title">Tableau hebdomadaire du plan nutritionnel</h2>
        <section class="planner-wrap">
            <table class="planner-table" aria-label="Tableau plan nutritionnel" id="plannerTable">
                <thead>
                    <tr>
                        <th>Jour</th>
                        <th>Objectif kcal</th>
                        <th>Petit-dejeuner</th>
                        <th>Dejeuner</th>
                        <th>Diner</th>
                        <th>Snack</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="planRows"></tbody>
            </table>
        </section>

        <p class="summary-line" id="summaryLine">Resume du plan en cours de generation...</p>
    </main>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);

            const objectifMap = {
                "perte-poids": "Perte de poids",
                "maintien": "Maintien",
                "prise-muscle": "Prise de muscle"
            };

            const objectif = params.get("objectif") || "maintien";
            const duree = params.get("duree") || "7";
            const allergies = (params.get("allergies") || "").trim();
            const prefs = params.getAll("preferences");
            const prefsText = prefs.length ? prefs.join(", ").replace(/-/g, " ") : "Aucune preference";

            const subtitle =
                "Objectif: " + (objectifMap[objectif] || "Maintien") +
                " | Duree: " + duree + " jours" +
                " | Preferences: " + prefsText +
                (allergies ? " | Allergies: " + allergies : "");

            const kcalMap = {
                "perte-poids": 1750,
                "maintien": 2100,
                "prise-muscle": 2500
            };

            const mealTemplates = [
                {
                    petit: "Overnight oats, fruits rouges, amandes",
                    dej: "Bowl quinoa, pois chiches, legumes verts",
                    diner: "Filet de poisson, patate douce, brocoli",
                    snack: "Yaourt nature et noix"
                },
                {
                    petit: "Omelette epinards et pain complet",
                    dej: "Salade lentilles, crudites, feta",
                    diner: "Poulet grille, riz complet, courgettes",
                    snack: "Pomme et beurre d'arachide"
                },
                {
                    petit: "Smoothie banane, avoine, lait vegetal",
                    dej: "Wrap dinde, avocat, salade",
                    diner: "Saumon au four, quinoa, haricots verts",
                    snack: "Fromage blanc et graines"
                }
            ];

            const totalDays = Math.max(1, Number.parseInt(duree, 10) || 7);
            const visibleDays = Math.min(totalDays, 10);
            const baseKcal = kcalMap[objectif] || 2100;

            const planRows = document.getElementById("planRows");
            for (let day = 1; day <= visibleDays; day++) {
                const tpl = mealTemplates[(day - 1) % mealTemplates.length];
                const dayKcal = baseKcal + ((day % 2 === 0) ? 80 : -60);
                const row = document.createElement("tr");
                row.innerHTML =
                    "<td>Jour " + day + "</td>" +
                    "<td>" + dayKcal + " kcal</td>" +
                    "<td>" + tpl.petit + "</td>" +
                    "<td>" + tpl.dej + "</td>" +
                    "<td>" + tpl.diner + "</td>" +
                    "<td>" + tpl.snack + "</td>" +
                    "<td><button type=\"button\" class=\"signal-btn\" data-day=\"" + day + "\">Signaler</button></td>";
                planRows.appendChild(row);
            }

            planRows.addEventListener("click", (event) => {
                const btn = event.target.closest(".signal-btn");
                if (!btn) return;
                const day = btn.getAttribute("data-day") || "?";
                btn.textContent = "Signale";
                btn.disabled = true;
                btn.style.opacity = "0.7";
                alert("Le plan du Jour " + day + " a ete signale au support.");
            });

            document.getElementById("summaryLine").textContent =
                "Plan " + (objectifMap[objectif] || "Maintien") +
                " sur " + totalDays +
                " jours | Affichage: " + visibleDays +
                " premiers jours" +
                (allergies ? " | Allergies a eviter: " + allergies : "");

            document.getElementById("heroSubtitle").textContent = subtitle;
            document.getElementById("userTarget").textContent = (objectifMap[objectif] || "Maintien") + " - " + duree + "j";
        })();
    </script>
</body>
</html>
